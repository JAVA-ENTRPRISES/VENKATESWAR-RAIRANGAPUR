<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Contact | Venkateswar School</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"/>
</head>

<body class="bg-gray-50">

<div id="header"></div>

<!-- HERO SIMPLE -->
<section class="bg-blue-600 text-white py-20 text-center">
  <h1 class="text-5xl font-bold mb-4">Contact Us</h1>
  <p class="text-lg">We would love to hear from you</p>
</section>


<!-- CONTACT CARDS -->
<section class="py-16 -mt-16">
<div class="max-w-6xl mx-auto px-6 grid md:grid-cols-3 gap-8">

<div class="bg-white p-6 rounded-xl shadow text-center">
  <i class="fa fa-phone text-blue-600 text-2xl mb-3"></i>
  <h3 class="font-semibold">Call Us</h3>
  <p class="text-gray-600 text-sm">+91 7008777353</p>
</div>

<div class="bg-white p-6 rounded-xl shadow text-center">
  <i class="fa fa-envelope text-purple-600 text-2xl mb-3"></i>
  <h3 class="font-semibold">Email</h3>
  <p class="text-gray-600 text-sm">rairangpurvenkateswarschool@gmail.com</p>
</div>

<div class="bg-white p-6 rounded-xl shadow text-center">
  <i class="fa fa-location-dot text-green-600 text-2xl mb-3"></i>
  <h3 class="font-semibold">Visit Us</h3>
  <p class="text-gray-600 text-sm">
    Rairangpur, Mayurbhanj, Odisha - 757043
  </p>
</div>

</div>
</section>


<!-- MAIN SECTION (FORM + MAP) -->
<section class="py-20">
<div class="max-w-7xl mx-auto px-6 grid md:grid-cols-2 gap-10 items-start">

<!-- FORM -->
<div class="bg-white p-8 rounded-2xl shadow-lg">
  <h2 class="text-2xl font-bold mb-6 text-gray-800">Send Message</h2>

  <form class="space-y-4">

    <div class="grid md:grid-cols-2 gap-4">
      <input type="text" placeholder="Full Name"
      class="p-3 border rounded w-full focus:ring-2 focus:ring-blue-500 outline-none">

      <input type="email" placeholder="Email"
      class="p-3 border rounded w-full focus:ring-2 focus:ring-blue-500 outline-none">
    </div>

    <input type="tel" placeholder="Phone Number"
    class="p-3 border rounded w-full focus:ring-2 focus:ring-blue-500 outline-none">

    <select class="p-3 border rounded w-full focus:ring-2 focus:ring-blue-500 outline-none">
      <option>Select Subject</option>
      <option>Admission</option>
      <option>General Enquiry</option>
      <option>Complaint</option>
    </select>

    <textarea rows="4" placeholder="Your Message"
    class="p-3 border rounded w-full focus:ring-2 focus:ring-blue-500 outline-none"></textarea>

    <button class="w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700">
      Send Message
    </button>

  </form>
</div>

<!-- MAP + INFO -->
<div class="space-y-6">

<div class="rounded-xl overflow-hidden shadow-lg">
  <iframe class="w-full h-[300px] border-0" src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3519.5050731943616!2d86.18066929999999!3d22.255421700000003!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3a1e0b88bcfe3a43%3A0x4b7c7396f56978e1!2sVenkateswar%20School%2C%20Rairangpur!5e1!3m2!1sen!2sin!4v1776923046554!5m2!1sen!2sin" loading="lazy"></iframe>
</div>

<!-- <div class="bg-white p-6 rounded-xl shadow">
  <h3 class="font-semibold mb-3 text-gray-800">Office Hours</h3>
  <p class="text-sm text-gray-600">Mon - Sat: 9:00 AM - 5:00 PM</p>
  <p class="text-sm text-gray-600">Sunday: Closed</p>
</div> -->

<div class="bg-white p-6 rounded-xl shadow">
  <h3 class="font-semibold mb-3 text-gray-800">Follow Us</h3>
  <div class="flex gap-4 text-lg text-gray-600">
    <i class="fab fa-facebook hover:text-blue-600 cursor-pointer"></i>
    <i class="fab fa-instagram hover:text-pink-500 cursor-pointer"></i>
    <i class="fab fa-twitter hover:text-sky-400 cursor-pointer"></i>
  </div>
</div>

</div>

</div>
</section>


<!-- CTA -->
<section class="py-16 bg-blue-600 text-white text-center">
  <h2 class="text-3xl font-bold mb-4">Need Help?</h2>
  <p class="mb-6">Our team is ready to assist you anytime.</p>

  <a href="tel:+919807546446"
  class="bg-white text-blue-600 px-6 py-3 rounded-lg font-semibold">
  Call Now
  </a>
</section>


<div id="footer"></div>

<script src="js/main.js"></script>

</body>
</html>
